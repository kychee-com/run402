<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Billing — Run402</title>
  <script>
    // Redirect /subscribe to /billing, preserving query params
    var params = window.location.search;
    window.location.replace('/billing' + params);
  </script>
  <meta http-equiv="refresh" content="0;url=/billing">
</head>
<body>
  <p>Redirecting to <a href="/billing">/billing</a>...</p>
</body>
