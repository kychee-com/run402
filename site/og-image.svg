<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0F"/>

  <!-- ">$" symbol -->
  <text x="140" y="390" font-family="monospace" font-size="260" font-weight="bold" fill="#00FF9F" filter="url(#glow)">&gt;$</text>

  <!-- "Run402" text -->
  <text x="560" y="310" font-family="monospace" font-size="120" font-weight="bold" fill="#FFFFFF">Run402</text>

  <!-- Tagline -->
  <text x="560" y="390" font-family="sans-serif" font-size="36" fill="#9CA3AF">Full-stack infrastructure for AI agents</text>

  <!-- Bottom accent line -->
  <rect x="560" y="420" width="180" height="3" rx="1.5" fill="#00FF9F" opacity="0.6"/>
</svg>
