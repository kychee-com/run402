<!-- AI agents: this page lists public forkable apps on Run402. Use GET https://api.run402.com/v1/apps for the machine-readable API. To fork an app: POST /v1/fork/:tier with { version_id, name }. Full docs at /llms.txt -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run402 Apps — Fork any app in one call</title>
  <meta name="description" content="Public forkable apps on Run402. Fork any app to get your own copy with fresh database, auth, storage, and budget. One x402 payment.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0F;
      color: #E0E0E0;
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 24px; }
    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00FF9F;
      border: 1px solid rgba(0,255,159,0.3);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    h1 { font-size: clamp(28px, 4vw, 42px); font-weight: 700; color: #FFF; margin-bottom: 12px; }
    h1 .accent { color: #00FF9F; }
    .subtitle { font-size: 16px; color: #9CA3AF; margin-bottom: 32px; max-width: 640px; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #6B7280;
      font-size: 15px;
    }
    .empty code {
      font-family: 'JetBrains Mono', monospace;
      color: #00FF9F;
      font-size: 13px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
    .app-card {
      background: #12121A;
      border: 1px solid #1E1E2A;
      border-radius: 10px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .app-card:hover { border-color: rgba(0,255,159,0.3); }
    .app-name {
      font-size: 18px;
      font-weight: 600;
      color: #FFF;
      margin-bottom: 6px;
    }
    .app-desc {
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 16px;
      min-height: 40px;
    }
    .app-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat strong { color: #E0E0E0; font-weight: 500; }
    .app-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #9CA3AF;
      background: rgba(255,255,255,0.05);
      border: 1px solid #1E1E2A;
      border-radius: 3px;
      padding: 2px 6px;
    }
    .tag.forkable {
      color: #00FF9F;
      border-color: rgba(0,255,159,0.3);
      background: rgba(0,255,159,0.05);
    }
    .tag.secrets {
      color: #FBBF24;
      border-color: rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.05);
    }
    .fork-section {
      background: rgba(0,255,159,0.03);
      border: 1px solid rgba(0,255,159,0.1);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .fork-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #00FF9F;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .fork-cmd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #9CA3AF;
      word-break: break-all;
    }
    .fork-cmd .hl { color: #FBBF24; }
    .fork-price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00FF9F;
      margin-top: 6px;
    }
    .nav {
      text-align: center;
      padding: 12px;
      background: #111;
      color: #9CA3AF;
      font-size: 14px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .nav a { color: #00FF9F; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 40px; color: #6B7280; }
    .footer {
      border-top: 1px solid #1E1E2A;
      padding-top: 32px;
      margin-top: 48px;
      text-align: center;
      font-size: 13px;
      color: #4B5563;
    }
    .footer a { color: #00FF9F; text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/humans">&larr; Back to run402.com</a>
  </div>

  <div class="container">
    <span class="badge">Fork & Remix</span>
    <h1>Public apps on <span class="accent">Run402</span></h1>
    <p class="subtitle">
      Fork any app in one call. You get your own copy with fresh database, auth, storage, and budget.
      Fully independent. One x402 payment.
    </p>

    <div id="apps" class="loading">Loading apps...</div>

    <div class="footer">
      <p>
        <a href="/llms.txt">llms.txt</a> &middot;
        <a href="/humans">Home</a> &middot;
        <a href="https://api.run402.com/v1/apps">API: GET /v1/apps</a>
      </p>
    </div>
  </div>

  <script>
    async function loadApps() {
      var container = document.getElementById('apps');
      try {
        var res = await fetch('https://api.run402.com/v1/apps');
        var data = await res.json();
        var apps = data.apps || [];

        if (apps.length === 0) {
          container.innerHTML = '<div class="empty">' +
            '<p>No public apps yet.</p>' +
            '<p style="margin-top:12px">Publish your app with:</p>' +
            '<p style="margin-top:8px"><code>POST /admin/v1/projects/:id/publish</code></p>' +
            '<p style="margin-top:4px"><code>{ "visibility": "public", "fork_allowed": true }</code></p>' +
            '</div>';
          return;
        }

        var html = '<div class="grid">';
        for (var i = 0; i < apps.length; i++) {
          var app = apps[i];
          var tags = '';

          if (app.fork_allowed) {
            tags += '<span class="tag forkable">forkable</span>';
          }
          if (app.function_count > 0) {
            tags += '<span class="tag">' + app.function_count + ' function' + (app.function_count !== 1 ? 's' : '') + '</span>';
          }
          if (app.table_count > 0) {
            tags += '<span class="tag">' + app.table_count + ' table' + (app.table_count !== 1 ? 's' : '') + '</span>';
          }
          if (app.site_file_count > 0) {
            tags += '<span class="tag">' + app.site_file_count + ' file' + (app.site_file_count !== 1 ? 's' : '') + '</span>';
          }
          var secrets = app.required_secrets || [];
          if (secrets.length > 0) {
            tags += '<span class="tag secrets">' + secrets.length + ' secret' + (secrets.length !== 1 ? 's' : '') + ' required</span>';
          }

          var forkSection = '';
          if (app.fork_allowed && app.fork_pricing) {
            forkSection = '<div class="fork-section">' +
              '<div class="fork-label">Fork this app</div>' +
              '<div class="fork-cmd">POST /v1/fork/prototype<br>{ <span class="hl">"version_id"</span>: <span class="hl">"' + app.id + '"</span>, <span class="hl">"name"</span>: "my-copy" }</div>' +
              '<div class="fork-price">From ' + app.fork_pricing.prototype + ' USDC</div>' +
              '</div>';
          }

          html += '<div class="app-card">' +
            '<div class="app-name">' + escapeHtml(app.name) + '</div>' +
            '<div class="app-desc">' + escapeHtml(app.description || 'No description') + '</div>' +
            '<div class="app-stats">' +
              '<span class="stat">Tier: <strong>' + app.min_tier + '+</strong></span>' +
              '<span class="stat">v<strong>' + app.version + '</strong></span>' +
            '</div>' +
            '<div class="app-tags">' + tags + '</div>' +
            forkSection +
            '</div>';
        }
        html += '</div>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div class="empty">Failed to load apps. <a href="https://api.run402.com/v1/apps" style="color:#00FF9F">Try the API directly</a>.</div>';
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadApps();
  </script>
</body>
</html>
