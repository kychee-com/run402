  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0F;
      color: #E0E0E0;
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 60px 24px; }
    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00FF9F;
      border: 1px solid rgba(0,255,159,0.3);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    h1 { font-size: clamp(28px, 4vw, 42px); font-weight: 700; color: #FFF; margin-bottom: 12px; }
    h1 .accent { color: #00FF9F; }
    .subtitle { font-size: 16px; color: #9CA3AF; margin-bottom: 32px; max-width: 640px; }
    .empty {
      text-align: center;

    }
    .empty code {
      font-family: 'JetBrains Mono', monospace;

      font-size: 18px;
      font-weight: 600;
      color: #FFF;
      margin-bottom: 6px;
    }
    .app-desc {
      font-size: 14px;
      color: #9CA3AF;
      margin-bottom: 16px;
      min-height: 40px;
    }

      display: flex;

      margin-bottom: 16px;
      flex-wrap: wrap;

<body>
  <div class="nav">
    <a href="/humans">&larr; Back to run402.com</a>
  </div>

  <div class="container">
    <span class="badge">Fork & Remix</span>
    <h1>Public apps on <span class="accent">Run402</span></h1>
    <p class="subtitle">
      Fork any app in one call. You get your own copy with fresh database, auth, storage, and budget.
      Fully independent. One x402 payment.
    </p>

    <div id="filterBar" class="filter-bar" style="display:none"></div>
    <div id="apps" class="loading">Loading apps...</div>

    <div class="footer">
      <p>
        <a href="/llms.txt">llms.txt</a> &middot;
        <a href="/humans">Home</a> &middot;
        <a href="https://api.run402.com/v1/apps">API: GET /v1/apps</a>
      </p>
    </div>
  </div>

  <script>
    var allApps = [];
    var activeFilters = new Set();

    async function loadApps() {
      var container = document.getElementById('apps');
      try {
        var res = await fetch('https://api.run402.com/v1/apps');
        var data = await res.json();
        allApps = data.apps || [];

        if (allApps.length === 0) {
          container.innerHTML = '<div class="empty">' +
            '<p>No public apps yet.</p>' +
            '<p style="margin-top:12px">Publish your app with:</p>' +
            '<p style="margin-top:8px"><code>POST /admin/v1/projects/:id/publish</code></p>' +
            '<p style="margin-top:4px"><code>{ "visibility": "public", "fork_allowed": true }</code></p>' +
            '</div>';
          return;
        }

        buildFilterBar();
        renderApps(allApps);
      } catch (err) {
        container.innerHTML = '<div class="empty">Failed to load apps. <a href="https://api.run402.com/v1/apps" style="color:#00FF9F">Try the API directly</a>.</div>';
      }
    }

    function buildFilterBar() {
      var tagCounts = {};
      for (var i = 0; i < allApps.length; i++) {
        var appTags = allApps[i].tags || [];
        for (var j = 0; j < appTags.length; j++) {
          tagCounts[appTags[j]] = (tagCounts[appTags[j]] || 0) + 1;
        }
      }
      var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });
      if (sortedTags.length === 0) return;

      var bar = document.getElementById('filterBar');
      bar.style.display = 'flex';
      var html = '';
      for (var k = 0; k < sortedTags.length; k++) {
        html += '<button class="filter-tag" data-tag="' + sortedTags[k] + '" onclick="toggleFilter(this)">' +
          sortedTags[k] + ' <span style="opacity:0.5">(' + tagCounts[sortedTags[k]] + ')</span></button>';
      }
      bar.innerHTML = html;
    }

    function toggleFilter(btn) {
      var tag = btn.getAttribute('data-tag');
      if (activeFilters.has(tag)) {
        activeFilters.delete(tag);
        btn.classList.remove('active');
      } else {
        activeFilters.add(tag);
        btn.classList.add('active');
      }
      var filtered = allApps;
      if (activeFilters.size > 0) {
        filtered = allApps.filter(function(app) {
          var appTags = app.tags || [];
          var match = true;
          activeFilters.forEach(function(f) { if (appTags.indexOf(f) === -1) match = false; });
          return match;
        });
      }
      renderApps(filtered);
    }

    function renderApps(apps) {
      var container = document.getElementById('apps');
      if (apps.length === 0) {
        container.innerHTML = '<div class="empty">No apps match the selected filters.</div>';
        return;
      }

      var html = '<div class="grid">';
      for (var i = 0; i < apps.length; i++) {
        var app = apps[i];
        var tagsHtml = '';

        if (app.fork_allowed) {
          tagsHtml += '<span class="tag forkable">forkable</span>';
        }
        var appTags = app.tags || [];
        for (var t = 0; t < appTags.length; t++) {
          tagsHtml += '<span class="tag">' + escapeHtml(appTags[t]) + '</span>';
        }
        if (app.table_count > 0) {
          tagsHtml += '<span class="tag">' + app.table_count + ' table' + (app.table_count !== 1 ? 's' : '') + '</span>';
        }
        if (app.function_count > 0) {
          tagsHtml += '<span class="tag">' + app.function_count + ' function' + (app.function_count !== 1 ? 's' : '') + '</span>';
        }
        var secrets = app.required_secrets || [];
        if (secrets.length > 0) {
          tagsHtml += '<span class="tag secrets">' + secrets.length + ' secret' + (secrets.length !== 1 ? 's' : '') + ' required</span>';
        }

        var forkSection = '';
        if (app.fork_allowed && app.fork_pricing) {
          forkSection = '<div class="fork-section">' +
            '<div class="fork-label">Fork this app</div>' +
            '<div class="fork-cmd">POST /v1/fork/prototype<br>{ <span class="hl">"version_id"</span>: <span class="hl">"' + app.id + '"</span>, <span class="hl">"name"</span>: "my-copy" }</div>' +
            '<div class="fork-price">From ' + app.fork_pricing.prototype + ' USDC</div>' +
            '</div>';
        }

        var liveLink = '';
        if (app.live_url) {
          liveLink = '<a href="' + escapeHtml(app.live_url) + '" target="_blank" style="color:#00FF9F;font-family:\'JetBrains Mono\',monospace;font-size:12px;text-decoration:none;border:1px solid rgba(0,255,159,0.3);border-radius:4px;padding:2px 8px;margin-left:8px;">Visit</a>';
        }

        html += '<div class="app-card">' +
          '<div class="app-name">' + escapeHtml(app.name) + liveLink + '</div>' +
          '<div class="app-desc">' + escapeHtml(app.description || 'No description') + '</div>' +
          '<div class="app-stats">' +
            '<span class="stat">Tier: <strong>' + app.min_tier + '+</strong></span>' +
            '<span class="stat">v<strong>' + app.version + '</strong></span>' +
          '</div>' +
          '<div class="app-tags">' + tagsHtml + '</div>' +
          forkSection +
          '</div>';
      }
      html += '</div>';
      container.innerHTML = html;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadApps();
  </script>
</body>
</html>
