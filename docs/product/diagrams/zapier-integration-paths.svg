<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
  <style>
    text { fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">Zapier — integration paths</text>

  <rect x="240" y="50" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#085041">run402 REST API</text>

  <line x1="270" y1="94" x2="120" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="94" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="94" x2="560" y2="140" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="140" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="120" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">Webhooks by Zapier</text>
  <text class="ts" x="120" y="176" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Raw HTTP calls</text>
  <text class="ts" x="120" y="214" text-anchor="middle">Effort: docs only</text>
  <text class="ts" x="120" y="231" text-anchor="middle">Reach: paid plan users</text>
  <text class="ts" x="120" y="248" text-anchor="middle">No review needed</text>

  <rect x="250" y="140" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Private integration</text>
  <text class="ts" x="340" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Platform UI or CLI</text>
  <text class="ts" x="340" y="214" text-anchor="middle">Share via invite link</text>
  <text class="ts" x="340" y="231" text-anchor="middle">No review, no directory</text>
  <text class="ts" x="340" y="248" text-anchor="middle">Auth config mandatory</text>

  <rect x="480" y="140" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="560" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Public integration</text>
  <text class="ts" x="560" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">App directory listing</text>

  <line x1="560" y1="196" x2="560" y2="240" class="arr" marker-end="url(#arrow)"/>

  <rect x="480" y="240" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="560" y="262" text-anchor="middle" dominant-baseline="central" fill="#444441">Submit for review</text>
  <text class="ts" x="440" y="268" text-anchor="end">~1 week</text>

  <line x1="560" y1="284" x2="560" y2="310" class="arr" marker-end="url(#arrow)"/>

  <rect x="480" y="310" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="560" y="332" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Beta (90 days)</text>

  <line x1="560" y1="354" x2="560" y2="380" class="arr" marker-end="url(#arrow)"/>

  <rect x="460" y="380" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="560" y="398" text-anchor="middle" dominant-baseline="central" fill="#712B13">Exit requirements</text>
  <text class="ts" x="560" y="416" text-anchor="middle" dominant-baseline="central" fill="#993C1D">10 templates + 50 users</text>

  <line x1="560" y1="436" x2="560" y2="462" class="arr" marker-end="url(#arrow)"/>

  <rect x="480" y="462" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="560" y="484" text-anchor="middle" dominant-baseline="central" fill="#085041">Public + Partner</text>

  <line x1="40" y1="530" x2="640" y2="530" stroke="#B4B2A9" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="340" y="555" text-anchor="middle" dominant-baseline="central">Barriers</text>

  <rect x="40" y="570" width="140" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="110" y="590" text-anchor="middle" dominant-baseline="central" fill="#712B13">Auth mandatory</text>

  <rect x="196" y="570" width="140" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="266" y="590" text-anchor="middle" dominant-baseline="central" fill="#712B13">No financial txns</text>

  <rect x="352" y="570" width="140" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="422" y="590" text-anchor="middle" dominant-baseline="central" fill="#712B13">Test account req'd</text>

  <rect x="508" y="570" width="140" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="578" y="590" text-anchor="middle" dominant-baseline="central" fill="#712B13">50-user chicken/egg</text>
</svg>
