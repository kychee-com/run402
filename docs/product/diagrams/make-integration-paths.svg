<svg width="680" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
  <style>
    text { fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">Make.com — integration paths</text>

  <rect x="240" y="50" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#085041">run402 REST API</text>

  <line x1="270" y1="94" x2="120" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="94" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="94" x2="560" y2="140" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="140" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="120" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">HTTP module</text>
  <text class="ts" x="120" y="176" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Built-in, any API</text>
  <text class="ts" x="120" y="214" text-anchor="middle">Effort: docs only</text>
  <text class="ts" x="120" y="231" text-anchor="middle">Reach: all users</text>
  <text class="ts" x="120" y="248" text-anchor="middle">AI assistant auto-generates</text>
  <text class="ts" x="120" y="265" text-anchor="middle">from API docs</text>

  <rect x="250" y="140" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Custom app (private)</text>
  <text class="ts" x="340" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Apps Editor / VS Code</text>
  <text class="ts" x="340" y="214" text-anchor="middle">Effort: hours (simple API)</text>
  <text class="ts" x="340" y="231" text-anchor="middle">Reach: your org only</text>
  <text class="ts" x="340" y="248" text-anchor="middle">No review, instant</text>
  <text class="ts" x="340" y="265" text-anchor="middle">JSON config, not code</text>

  <rect x="480" y="140" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="560" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Custom app (public)</text>
  <text class="ts" x="560" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Verified listing</text>

  <line x1="560" y1="196" x2="560" y2="240" class="arr" marker-end="url(#arrow)"/>

  <rect x="480" y="240" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="560" y="262" text-anchor="middle" dominant-baseline="central" fill="#444441">Submit for review</text>
  <text class="ts" x="440" y="268" text-anchor="end">Weeks (opaque)</text>

  <line x1="560" y1="284" x2="560" y2="320" class="arr" marker-end="url(#arrow)"/>

  <line x1="540" y1="320" x2="490" y2="350" class="arr" marker-end="url(#arrow)"/>
  <line x1="580" y1="320" x2="610" y2="350" class="arr" marker-end="url(#arrow)"/>

  <rect x="420" y="350" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="480" y="372" text-anchor="middle" dominant-baseline="central" fill="#444441">Community</text>
  <text class="ts" x="480" y="412" text-anchor="middle">Lower bar</text>

  <rect x="560" y="350" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="610" y="372" text-anchor="middle" dominant-baseline="central" fill="#085041">Verified</text>
  <text class="ts" x="610" y="412" text-anchor="middle">Higher bar</text>

  <line x1="40" y1="440" x2="640" y2="440" stroke="#B4B2A9" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="340" y="465" text-anchor="middle" dominant-baseline="central">Barriers</text>

  <rect x="40" y="485" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="110" y="503" text-anchor="middle" dominant-baseline="central" fill="#712B13">Auth required</text>
  <text class="ts" x="110" y="521" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Connection mandatory</text>

  <rect x="200" y="485" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="270" y="503" text-anchor="middle" dominant-baseline="central" fill="#712B13">Data Store overlap</text>
  <text class="ts" x="270" y="521" text-anchor="middle" dominant-baseline="central" fill="#993C1D">May see as competing</text>

  <rect x="360" y="485" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="430" y="503" text-anchor="middle" dominant-baseline="central" fill="#712B13">No self-hosting</text>
  <text class="ts" x="430" y="521" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Can't sideload apps</text>

  <rect x="520" y="485" width="140" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="590" y="503" text-anchor="middle" dominant-baseline="central" fill="#712B13">Opaque review</text>
  <text class="ts" x="590" y="521" text-anchor="middle" dominant-baseline="central" fill="#993C1D">No published criteria</text>
</svg>
