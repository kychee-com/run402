<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: transparent;">
  <style>
    text { fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 2; }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">n8n — integration paths</text>

  <rect x="240" y="50" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#085041">run402 REST API</text>

  <line x1="270" y1="94" x2="120" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="94" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="94" x2="560" y2="140" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="140" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="120" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">HTTP Request node</text>
  <text class="ts" x="120" y="176" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">+ HTTP Tool (agents)</text>
  <text class="ts" x="120" y="214" text-anchor="middle">Effort: near zero</text>
  <text class="ts" x="120" y="231" text-anchor="middle">Reach: all users</text>
  <text class="ts" x="120" y="248" text-anchor="middle">No review, no auth config</text>

  <rect x="240" y="140" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Community node (npm)</text>
  <text class="ts" x="340" y="176" text-anchor="middle" dominant-baseline="central" fill="#534AB7">TypeScript package</text>

  <line x1="300" y1="196" x2="270" y2="240" class="arr" marker-end="url(#arrow)"/>
  <line x1="380" y1="196" x2="410" y2="240" class="arr" marker-end="url(#arrow)"/>

  <rect x="180" y="240" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="250" y="262" text-anchor="middle" dominant-baseline="central" fill="#444441">Unverified</text>
  <text class="ts" x="250" y="302" text-anchor="middle">Self-hosted only</text>
  <text class="ts" x="250" y="319" text-anchor="middle">Publish to npm, done</text>

  <rect x="360" y="240" width="140" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="430" y="262" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Verified</text>
  <text class="ts" x="430" y="302" text-anchor="middle">Self-hosted + cloud</text>
  <text class="ts" x="430" y="319" text-anchor="middle">Creator Portal review</text>
  <text class="ts" x="430" y="336" text-anchor="middle">~2-6 weeks, demo video</text>

  <rect x="490" y="140" width="150" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="565" y="158" text-anchor="middle" dominant-baseline="central" fill="#712B13">Workflow templates</text>
  <text class="ts" x="565" y="176" text-anchor="middle" dominant-baseline="central" fill="#993C1D">JSON exports</text>
  <text class="ts" x="565" y="214" text-anchor="middle">Highest-leverage content</text>
  <text class="ts" x="565" y="231" text-anchor="middle">Share on forum + gallery</text>

  <line x1="40" y1="370" x2="640" y2="370" stroke="#B4B2A9" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="340" y="398" text-anchor="middle" dominant-baseline="central">Barriers</text>

  <rect x="40" y="420" width="185" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="132" y="438" text-anchor="middle" dominant-baseline="central" fill="#712B13">Credential mismatch</text>
  <text class="ts" x="132" y="456" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Nodes require auth config</text>

  <rect x="248" y="420" width="185" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="438" text-anchor="middle" dominant-baseline="central" fill="#712B13">Feature competition</text>
  <text class="ts" x="340" y="456" text-anchor="middle" dominant-baseline="central" fill="#993C1D">n8n building AI memory</text>

  <rect x="456" y="420" width="185" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="548" y="438" text-anchor="middle" dominant-baseline="central" fill="#712B13">Cloud gating</text>
  <text class="ts" x="548" y="456" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Unverified ≠ cloud access</text>

  <rect x="100" y="510" width="480" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="532" text-anchor="middle" dominant-baseline="central" fill="#085041">Start: HTTP docs + templates → then: verified community node</text>
</svg>
