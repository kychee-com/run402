name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - packages/shared/**
      - packages/gateway/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: 472210437512.dkr.ecr.us-east-1.amazonaws.com/agentdb-gateway
  ECS_CLUSTER: AgentDB-Pod01-ClusterEB0386A7-qXAYbEVDllzd
  ECS_SERVICE: AgentDB-Pod01-ServiceD69D759B-Ko0ySLxS6H2Q

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage -- --check-coverage --lines 30
        working-directory: packages/gateway

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::472210437512:role/run402-gateway-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin ${{ env.ECR_REPO }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/gateway/Dockerfile
          push: true
          tags: ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS deployment (latest task def revision)
        run: |
          LATEST_TD=$(aws ecs describe-task-definition \
            --task-definition AgentDBPod01TaskDef0304D417 \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Using task definition: $LATEST_TD"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "$LATEST_TD" \
            --force-new-deployment \
            --region $AWS_REGION \
            --no-cli-pager

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
