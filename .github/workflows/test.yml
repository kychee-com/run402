name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm run test:skill
      - run: npm run test:sync
      # Single-source gate: the committed flat agent files (llms-*.txt) must
      # match what docs-site/src/content regenerates. Pure Node — no docs-site
      # install needed. Fails the PR if content was edited without regenerating.
      - run: node scripts/build-agent-flat-docs.mjs --check
      # Quote the globs so Node handles expansion natively. Node's --test
      # glob matching recurses into nested dirs AND matches depth-0 files,
      # so it works regardless of the shell's globstar support. (Earlier
      # we relied on `shopt -s globstar`, which silently dropped sdk/src
      # tests because they weren't listed and dropped depth-0 files on
      # systems where globstar isn't enabled.)
      - run: node --experimental-test-module-mocks --test --import tsx 'src/**/*.test.ts' 'core/src/**/*.test.ts' 'sdk/src/**/*.test.ts'
      - run: npm run test:e2e
      - run: npm run test:integration
      # Type-check every TypeScript fenced block in sdk/README.md,
      # sdk/llms-sdk.txt, and the top-level README.md against the
      # published @run402/sdk and @run402/sdk/node types. Fails the PR if
      # any example references a method or field that does not exist on
      # the actual exports.
      - run: npm run test:docs

  # The human docs portal (Astro Starlight, static) must compile, and the deploy
  # manifest generator must produce a valid manifest from the build output.
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build docs portal
        working-directory: docs-site
        run: |
          npm ci
          npm run build
      - name: Build deploy manifest from dist
        run: node scripts/build-docs-deploy-manifest.mjs
      - name: Agent flat docs are regenerated from portal content (single source)
        run: node scripts/build-agent-flat-docs.mjs --check

  # @run402/astro has an independent release cadence, but it still lives in
  # this monorepo and imports workspace SDK types. Keep its publish-time gates
  # on ordinary PRs too so Astro regressions are caught before release day.
  astro:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Build @run402/sdk + core
        run: |
          npm run build:core
          npm run build:sdk
      - name: Type-check @run402/astro
        run: npx tsc --noEmit -p astro
      - name: Test @run402/astro
        run: npm test --workspace=astro
      - name: Build @run402/astro
        run: npm run build --workspace=astro
