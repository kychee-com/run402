# Local development: Postgres + PostgREST (gateway runs via `npm run dev`)
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentdb
    volumes:
      - ./packages/gateway/src/db/init.sql:/docker-entrypoint-initdb.d/init-db.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    command:
      - /bin/sh
      - -ec
      - |
        schema_list=""
        i=1
        max_slots="$${MAX_SCHEMA_SLOTS:-2000}"
        while [ "$$i" -le "$$max_slots" ]; do
          schema="$$(printf 'p%04d' "$$i")"
          if [ -n "$$schema_list" ]; then
            schema_list="$$schema_list,$$schema"
          else
            schema_list="$$schema"
          fi
          i=$$(($$i + 1))
        done
        export PGRST_DB_SCHEMAS="$$schema_list"
        exec postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@postgres:5432/agentdb
      MAX_SCHEMA_SLOTS: ${MAX_SCHEMA_SLOTS:-2000}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-for-agentdb-test-only-32chars!!}
      PGRST_DB_PRE_REQUEST: internal.pre_request
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
