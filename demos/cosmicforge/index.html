<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Forge — Shape the Universe</title>
  <meta name="description" content="An interactive Three.js particle cosmos. Type a concept and watch 100,000 particles morph into living formations.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    #status {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      transition: opacity 0.5s;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }

    #input-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    #concept-input {
      width: 320px;
      padding: 12px 18px;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #concept-input:focus {
      border-color: rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.2);
    }

    #concept-input::placeholder { color: rgba(255,255,255,0.3); }

    #forge-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #forge-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 24px rgba(139, 92, 246, 0.4);
    }

    #forge-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #title {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    #title h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-shadow: none;
    }

    #title p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    #entity-info {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #entity-info.visible { opacity: 1; }

    #entity-name {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px currentColor;
    }

    #entity-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      max-width: 400px;
      line-height: 1.5;
    }

    #presets {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .preset-btn {
      padding: 8px 14px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      text-align: left;
    }

    .preset-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.15);
    }

    #help {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
      pointer-events: none;
      transition: opacity 2s;
    }

    @media (max-width: 600px) {
      #concept-input { width: 200px; font-size: 0.85rem; padding: 10px 14px; }
      #forge-btn { padding: 10px 16px; font-size: 0.85rem; }
      #presets { display: none; }
      #title h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div id="title">
    <h1>Cosmic Forge</h1>
    <p>Type a concept. Watch the universe reshape.</p>
  </div>

  <div id="entity-info">
    <div id="entity-name"></div>
    <div id="entity-desc"></div>
  </div>

  <div id="presets">
    <button class="preset-btn" onclick="forgePreset('galaxy')">Galaxy</button>
    <button class="preset-btn" onclick="forgePreset('dna')">DNA Helix</button>
    <button class="preset-btn" onclick="forgePreset('blackhole')">Black Hole</button>
    <button class="preset-btn" onclick="forgePreset('supernova')">Supernova</button>
    <button class="preset-btn" onclick="forgePreset('tornado')">Tornado</button>
    <button class="preset-btn" onclick="forgePreset('heartbeat')">Heartbeat</button>
    <button class="preset-btn" onclick="forgePreset('ocean')">Ocean Wave</button>
    <button class="preset-btn" onclick="forgePreset('fireworks')">Fireworks</button>
  </div>

  <div id="help">Click to explode &bull; Drag to orbit &bull; Scroll to zoom &bull; Move mouse to repel</div>

  <div id="ui">
    <div id="status">Ready to forge</div>
    <div id="input-row">
      <input type="text" id="concept-input" placeholder="Enter a concept... (e.g. 'time', 'love', 'chaos')" maxlength="100">
      <button id="forge-btn" onclick="forge()">Forge</button>
    </div>
  </div>

  <!-- Three.js + addons from CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ============================================================
    // CONFIG
    // ============================================================
    const PARTICLE_COUNT = 80000;
    const TRANSITION_DURATION = 3.0; // seconds

    // ============================================================
    // SCENE SETUP
    // ============================================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.prepend(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxDistance = 30;
    controls.minDistance = 2;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      1.5,   // strength
      0.4,   // radius
      0.85   // threshold
    );
    composer.addPass(bloomPass);

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });

    // Mouse tracking for particle interaction
    const mouse = new THREE.Vector2(9999, 9999);
    const mouseWorld = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    // Click explosion tracking
    let explosionActive = false;
    let explosionDecay = 0;
    const EXPLOSION_RADIUS = 4.0;
    const EXPLOSION_FORCE = 12.0;
    const VELOCITY_DAMPING = 0.96;
    const RETURN_STRENGTH = 1.5;
    let bloomTarget = 1.5;

    // Track mouse down/up to distinguish clicks from drags
    let mouseDownPos = { x: 0, y: 0 };
    let isDragging = false;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      mouseDownPos.x = e.clientX;
      mouseDownPos.y = e.clientY;
      isDragging = false;
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
      const dx = e.clientX - mouseDownPos.x;
      const dy = e.clientY - mouseDownPos.y;
      if (dx * dx + dy * dy > 25) isDragging = true;
    });

    renderer.domElement.addEventListener('pointerup', (e) => {
      if (isDragging) return;

      // Get click position in world space
      const clickMouse = new THREE.Vector2(
        (e.clientX / innerWidth) * 2 - 1,
        -(e.clientY / innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(clickMouse, camera);
      const planeN = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);
      const clickPlane = new THREE.Plane(planeN, 0);
      const clickPoint = new THREE.Vector3();
      raycaster.ray.intersectPlane(clickPlane, clickPoint);
      if (!clickPoint) return;

      // Apply explosion force to nearby particles
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const dx = positions[i3] - clickPoint.x;
        const dy = positions[i3 + 1] - clickPoint.y;
        const dz = positions[i3 + 2] - clickPoint.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < EXPLOSION_RADIUS && dist > 0.001) {
          const falloff = 1.0 - dist / EXPLOSION_RADIUS;
          const force = EXPLOSION_FORCE * falloff * falloff * (0.7 + randoms[i] * 0.6);
          const invDist = 1.0 / dist;
          velocities[i3] += dx * invDist * force;
          velocities[i3 + 1] += dy * invDist * force;
          velocities[i3 + 2] += dz * invDist * force;
        }
      }

      explosionActive = true;
      explosionDecay = 1.0;

      // Flash bloom
      bloomTarget = 3.5;
      setTimeout(() => { bloomTarget = 1.5; }, 300);
    });

    // ============================================================
    // PARTICLE SYSTEM
    // ============================================================
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const randoms = new Float32Array(PARTICLE_COUNT);
    const originalPositions = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      randoms[i] = Math.random();
    }

    // Custom shader material for beautiful particles
    const particleMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uSize: { value: 3.0 * renderer.getPixelRatio() },
        uMouse: { value: new THREE.Vector3(9999, 9999, 9999) },
        uTransition: { value: 0 },
        uColorShift: { value: 0 },
        uPulse: { value: 0 },
        uTurbulence: { value: 0.3 },
      },
      vertexShader: `
        attribute float aSize;
        attribute float aRandom;
        attribute vec3 aTarget;
        attribute vec3 aVelocity;

        uniform float uTime;
        uniform float uSize;
        uniform vec3 uMouse;
        uniform float uTransition;
        uniform float uTurbulence;

        varying vec3 vColor;
        varying float vAlpha;
        varying float vDist;

        // Simplex-like noise
        vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
          const vec2 C = vec2(1.0/6.0, 1.0/3.0);
          const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;
          i = mod289(i);
          vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 0.142857142857;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ * ns.x + ns.yyyy;
          vec4 y = y_ * ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0)*2.0 + 1.0;
          vec4 s1 = floor(b1)*2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
          p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
          vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
          m = m * m;
          return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        void main() {
          vec3 pos = position;

          // Add turbulence
          float noiseScale = 0.5;
          float t = uTime * 0.15;
          vec3 noiseOffset = vec3(
            snoise(pos * noiseScale + t),
            snoise(pos * noiseScale + t + 100.0),
            snoise(pos * noiseScale + t + 200.0)
          ) * uTurbulence * (1.0 + aRandom * 0.5);

          pos += noiseOffset;

          // Mouse repulsion
          vec3 toMouse = pos - uMouse;
          float mouseDist = length(toMouse);
          if (mouseDist < 2.5) {
            float force = (1.0 - mouseDist / 2.5) * 1.2;
            pos += normalize(toMouse) * force;
          }

          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);

          // Distance-based size
          float distFactor = 1.0 / (-mvPosition.z * 0.15 + 1.0);
          gl_PointSize = uSize * (aSize * 0.5 + 0.5) * distFactor;
          gl_PointSize = max(gl_PointSize, 0.5);

          gl_Position = projectionMatrix * mvPosition;

          vColor = color;
          vDist = -mvPosition.z;

          // Alpha: fade distant particles
          vAlpha = smoothstep(80.0, 5.0, -mvPosition.z) * (0.6 + aSize * 0.4);
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;
        varying float vDist;

        void main() {
          // Soft circular particle
          vec2 center = gl_PointCoord - 0.5;
          float dist = length(center);
          if (dist > 0.5) discard;

          // Soft glow falloff
          float alpha = smoothstep(0.5, 0.0, dist);
          alpha *= alpha; // Extra soft

          // Core brightness
          float core = smoothstep(0.15, 0.0, dist) * 0.6;

          vec3 col = vColor + core;

          gl_FragColor = vec4(col, alpha * vAlpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
    });

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
    geometry.setAttribute('aTarget', new THREE.BufferAttribute(targetPositions, 3));
    geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
    geometry.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 3));

    const particles = new THREE.Points(geometry, particleMaterial);
    scene.add(particles);

    // ============================================================
    // FORMATION GENERATORS
    // ============================================================
    const formations = {
      galaxy(i, total) {
        const arm = Math.floor(Math.random() * 4);
        const armAngle = (arm / 4) * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.5) * 5;
        const spin = r * 0.8;
        const angle = armAngle + spin + (Math.random() - 0.5) * 0.5;
        const y = (Math.random() - 0.5) * 0.3 * (1 - r / 5);
        return [
          Math.cos(angle) * r,
          y + (Math.random() - 0.5) * 0.1,
          Math.sin(angle) * r
        ];
      },

      sphere(i, total) {
        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.33) * 4;
        return [
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        ];
      },

      dna(i, total) {
        const t = (i / total) * Math.PI * 12;
        const strand = i % 2;
        const phase = strand * Math.PI;
        const r = 1.5;
        const y = (i / total - 0.5) * 12;
        const jitter = 0.15;

        // Backbone or rung
        if (i % 20 < 2) {
          // Cross-rung connecting strands
          const lerp = (i % 20) / 1;
          const a1 = t;
          const a2 = t + Math.PI;
          const x = Math.cos(a1) * r * (1 - lerp) + Math.cos(a2) * r * lerp;
          const z = Math.sin(a1) * r * (1 - lerp) + Math.sin(a2) * r * lerp;
          return [x + (Math.random()-0.5)*jitter, y, z + (Math.random()-0.5)*jitter];
        }

        return [
          Math.cos(t + phase) * r + (Math.random()-0.5)*jitter,
          y + (Math.random()-0.5)*jitter,
          Math.sin(t + phase) * r + (Math.random()-0.5)*jitter
        ];
      },

      blackhole(i, total) {
        const r = Math.pow(Math.random(), 2) * 6;
        const angle = Math.random() * Math.PI * 2 + r * 2;
        const diskHeight = 0.05 + Math.random() * 0.05;
        const y = (Math.random() - 0.5) * diskHeight * (6 - r);

        if (r < 0.3) {
          // Event horizon - tight sphere
          const phi = Math.acos(2 * Math.random() - 1);
          const theta = Math.random() * Math.PI * 2;
          return [
            0.3 * Math.sin(phi) * Math.cos(theta),
            0.3 * Math.cos(phi),
            0.3 * Math.sin(phi) * Math.sin(theta)
          ];
        }

        return [Math.cos(angle) * r, y, Math.sin(angle) * r];
      },

      supernova(i, total) {
        // Expanding shell with inner remnant
        const isShell = Math.random() > 0.3;
        if (isShell) {
          const phi = Math.acos(2 * Math.random() - 1);
          const theta = Math.random() * Math.PI * 2;
          const r = 3.5 + (Math.random() - 0.5) * 1.0;
          return [
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.cos(phi),
            r * Math.sin(phi) * Math.sin(theta)
          ];
        } else {
          // Dense core
          const phi = Math.acos(2 * Math.random() - 1);
          const theta = Math.random() * Math.PI * 2;
          const r = Math.pow(Math.random(), 2) * 0.8;
          return [
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.cos(phi),
            r * Math.sin(phi) * Math.sin(theta)
          ];
        }
      },

      tornado(i, total) {
        const t = i / total;
        const y = (t - 0.5) * 10;
        const r = 0.3 + (t * t) * 3;
        const angle = t * Math.PI * 8 + Math.random() * 0.5;
        const jitter = r * 0.15;
        return [
          Math.cos(angle) * r + (Math.random()-0.5) * jitter,
          y,
          Math.sin(angle) * r + (Math.random()-0.5) * jitter
        ];
      },

      heartbeat(i, total) {
        // Heart shape in 3D
        const t = Math.random() * Math.PI * 2;
        const s = Math.random() * Math.PI;
        const scale = 2.0;

        // Parametric heart
        const x = scale * Math.sin(t) * Math.sin(t) * Math.sin(t);
        const y = scale * (0.8125 * Math.cos(t) - 0.3125 * Math.cos(2*t) - 0.125 * Math.cos(3*t) - 0.0625 * Math.cos(4*t));
        const z = (Math.random() - 0.5) * 1.0;

        return [
          x + (Math.random()-0.5)*0.15,
          y + (Math.random()-0.5)*0.15,
          z
        ];
      },

      ocean(i, total) {
        const x = (Math.random() - 0.5) * 12;
        const z = (Math.random() - 0.5) * 12;
        const wave1 = Math.sin(x * 0.8) * 0.6;
        const wave2 = Math.sin(z * 0.5 + x * 0.3) * 0.4;
        const wave3 = Math.sin(x * 1.5 + z * 0.7) * 0.2;
        const y = wave1 + wave2 + wave3 + (Math.random()-0.5)*0.1;
        return [x, y - 1, z];
      },

      fireworks(i, total) {
        // Multiple burst points
        const burst = Math.floor(Math.random() * 5);
        const cx = (burst % 3 - 1) * 3;
        const cy = (Math.floor(burst / 3)) * 2 + 1 + Math.random() * 2;
        const cz = (Math.random() - 0.5) * 2;

        const phi = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.5) * 2;

        return [
          cx + r * Math.sin(phi) * Math.cos(theta),
          cy + r * Math.cos(phi),
          cz + r * Math.sin(phi) * Math.sin(theta)
        ];
      },

      cube(i, total) {
        // Points on cube surface
        const face = Math.floor(Math.random() * 6);
        const s = 3;
        const u = (Math.random() - 0.5) * s;
        const v = (Math.random() - 0.5) * s;
        const coords = [
          [s/2, u, v], [-s/2, u, v],
          [u, s/2, v], [u, -s/2, v],
          [u, v, s/2], [u, v, -s/2]
        ];
        const p = coords[face];
        return [p[0]+(Math.random()-0.5)*0.05, p[1]+(Math.random()-0.5)*0.05, p[2]+(Math.random()-0.5)*0.05];
      },

      torus(i, total) {
        const R = 3, r = 1;
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI * 2;
        return [
          (R + r * Math.cos(v)) * Math.cos(u),
          r * Math.sin(v),
          (R + r * Math.cos(v)) * Math.sin(u)
        ];
      },

      nebula(i, total) {
        // Organic, filamentary structure
        const arm = Math.floor(Math.random() * 3);
        const t = Math.random() * 6;
        const baseAngle = (arm / 3) * Math.PI * 2 + t * 0.3;
        const r = t + (Math.random() - 0.5) * 1.5;
        const y = Math.sin(t * 0.5 + arm) * 2 + (Math.random()-0.5)*0.5;
        return [
          Math.cos(baseAngle) * r * 0.8,
          y,
          Math.sin(baseAngle) * r * 0.8
        ];
      },
    };

    // ============================================================
    // COLOR PALETTES
    // ============================================================
    const palettes = {
      galaxy:     [[0.4,0.2,0.8], [0.1,0.3,0.9], [0.8,0.4,0.9], [0.2,0.1,0.5]],
      dna:        [[0.0,0.8,0.6], [0.0,0.4,0.8], [0.2,0.9,0.4], [0.0,0.6,0.9]],
      blackhole:  [[1.0,0.3,0.0], [1.0,0.6,0.0], [0.8,0.1,0.0], [0.3,0.0,0.0]],
      supernova:  [[1.0,0.8,0.2], [1.0,0.4,0.1], [1.0,1.0,0.8], [0.9,0.2,0.1]],
      tornado:    [[0.5,0.5,0.5], [0.3,0.4,0.5], [0.6,0.6,0.7], [0.2,0.3,0.4]],
      heartbeat:  [[0.9,0.1,0.2], [1.0,0.3,0.4], [0.8,0.0,0.2], [1.0,0.5,0.6]],
      ocean:      [[0.0,0.3,0.6], [0.0,0.5,0.8], [0.1,0.7,0.9], [0.0,0.2,0.4]],
      fireworks:  [[1.0,0.8,0.0], [1.0,0.2,0.3], [0.2,0.5,1.0], [0.0,1.0,0.5]],
      cube:       [[0.9,0.9,0.9], [0.6,0.6,0.7], [0.8,0.8,0.9], [0.5,0.5,0.6]],
      torus:      [[0.8,0.5,0.2], [0.9,0.7,0.3], [0.7,0.3,0.1], [1.0,0.8,0.4]],
      nebula:     [[0.5,0.1,0.8], [0.8,0.2,0.6], [0.2,0.1,0.9], [0.9,0.3,0.7]],
    };

    // ============================================================
    // TRANSITION STATE
    // ============================================================
    let currentFormation = 'galaxy';
    let transitionProgress = 1;
    let transitionStart = 0;
    let isTransitioning = false;
    let currentPalette = palettes.galaxy;
    let targetPalette = palettes.galaxy;

    function applyFormation(name) {
      const fn = formations[name] || formations.galaxy;
      const pal = palettes[name] || palettes.galaxy;

      // Store current positions as starting points
      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        originalPositions[i] = positions[i];
      }

      // Generate target positions and colors
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const [x, y, z] = fn(i, PARTICLE_COUNT);
        targetPositions[i * 3] = x;
        targetPositions[i * 3 + 1] = y;
        targetPositions[i * 3 + 2] = z;

        sizes[i] = 0.3 + Math.random() * 0.7;
      }

      targetPalette = pal;
      currentFormation = name;
      transitionProgress = 0;
      transitionStart = performance.now() / 1000;
      isTransitioning = true;

      geometry.attributes.aTarget.needsUpdate = true;
      geometry.attributes.aSize.needsUpdate = true;
    }

    // Initialize with galaxy
    function initPositions() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const [x, y, z] = formations.galaxy(i, PARTICLE_COUNT);
        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        originalPositions[i * 3] = x;
        originalPositions[i * 3 + 1] = y;
        originalPositions[i * 3 + 2] = z;
        targetPositions[i * 3] = x;
        targetPositions[i * 3 + 1] = y;
        targetPositions[i * 3 + 2] = z;

        const pal = palettes.galaxy;
        const c = pal[Math.floor(Math.random() * pal.length)];
        const variation = 0.15;
        colors[i * 3] = c[0] + (Math.random() - 0.5) * variation;
        colors[i * 3 + 1] = c[1] + (Math.random() - 0.5) * variation;
        colors[i * 3 + 2] = c[2] + (Math.random() - 0.5) * variation;

        sizes[i] = 0.3 + Math.random() * 0.7;
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;
      geometry.attributes.aSize.needsUpdate = true;
    }

    initPositions();

    // ============================================================
    // ANIMATION LOOP
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();
      const delta = Math.min(clock.getDelta(), 0.05);

      // Update uniforms
      particleMaterial.uniforms.uTime.value = time;

      // Mouse world position for particle interaction
      raycaster.setFromCamera(mouse, camera);
      const planeNormal = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);
      const plane = new THREE.Plane(planeNormal, 0);
      const intersectPoint = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, intersectPoint);
      if (intersectPoint) {
        particleMaterial.uniforms.uMouse.value.lerp(intersectPoint, 0.1);
      }

      // Transition
      if (isTransitioning) {
        const elapsed = time - transitionStart;
        transitionProgress = Math.min(elapsed / TRANSITION_DURATION, 1);

        // Smooth easing
        const t = transitionProgress < 0.5
          ? 4 * transitionProgress * transitionProgress * transitionProgress
          : 1 - Math.pow(-2 * transitionProgress + 2, 3) / 2;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;

          const baseX = originalPositions[i3] + (targetPositions[i3] - originalPositions[i3]) * t;
          const baseY = originalPositions[i3+1] + (targetPositions[i3+1] - originalPositions[i3+1]) * t;
          const baseZ = originalPositions[i3+2] + (targetPositions[i3+2] - originalPositions[i3+2]) * t;

          // Apply velocity offset
          positions[i3] = baseX + velocities[i3] * explosionDecay;
          positions[i3+1] = baseY + velocities[i3+1] * explosionDecay;
          positions[i3+2] = baseZ + velocities[i3+2] * explosionDecay;

          // Lerp colors — flash white near explosion then fade back
          const pal = targetPalette;
          const c = pal[i % pal.length];
          const variation = 0.15;
          const speed = Math.abs(velocities[i3]) + Math.abs(velocities[i3+1]) + Math.abs(velocities[i3+2]);
          const flash = Math.min(speed * explosionDecay * 0.15, 1.0);
          const targetR = c[0] + (randoms[i] - 0.5) * variation + flash;
          const targetG = c[1] + (randoms[i] - 0.5) * variation + flash * 0.8;
          const targetB = c[2] + (randoms[i] - 0.5) * variation + flash * 0.5;
          colors[i3] += (targetR - colors[i3]) * 0.1;
          colors[i3+1] += (targetG - colors[i3+1]) * 0.1;
          colors[i3+2] += (targetB - colors[i3+2]) * 0.1;
        }

        if (transitionProgress >= 1) {
          isTransitioning = false;
          currentPalette = targetPalette;
        }

        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;
      }

      // Explosion velocity physics (runs even when not transitioning)
      if (explosionActive) {
        let totalSpeed = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          // Dampen velocity
          velocities[i3] *= VELOCITY_DAMPING;
          velocities[i3+1] *= VELOCITY_DAMPING;
          velocities[i3+2] *= VELOCITY_DAMPING;
          totalSpeed += Math.abs(velocities[i3]) + Math.abs(velocities[i3+1]) + Math.abs(velocities[i3+2]);
        }
        explosionDecay *= 0.97;

        // When not in a formation transition, apply velocity directly to positions
        if (!isTransitioning) {
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;

            // Apply velocity
            positions[i3] += velocities[i3] * 0.016;
            positions[i3+1] += velocities[i3+1] * 0.016;
            positions[i3+2] += velocities[i3+2] * 0.016;

            // Spring back toward target position
            const dx = targetPositions[i3] - positions[i3];
            const dy = targetPositions[i3+1] - positions[i3+1];
            const dz = targetPositions[i3+2] - positions[i3+2];
            velocities[i3] += dx * RETURN_STRENGTH * 0.016;
            velocities[i3+1] += dy * RETURN_STRENGTH * 0.016;
            velocities[i3+2] += dz * RETURN_STRENGTH * 0.016;

            // Flash colors for fast particles
            const speed = Math.abs(velocities[i3]) + Math.abs(velocities[i3+1]) + Math.abs(velocities[i3+2]);
            const flash = Math.min(speed * 0.08, 1.0);
            const pal = currentPalette;
            const c = pal[i % pal.length];
            const variation = 0.15;
            colors[i3] += (c[0] + (randoms[i] - 0.5) * variation + flash - colors[i3]) * 0.08;
            colors[i3+1] += (c[1] + (randoms[i] - 0.5) * variation + flash * 0.8 - colors[i3+1]) * 0.08;
            colors[i3+2] += (c[2] + (randoms[i] - 0.5) * variation + flash * 0.5 - colors[i3+2]) * 0.08;
          }
          geometry.attributes.position.needsUpdate = true;
          geometry.attributes.color.needsUpdate = true;
        }

        // Deactivate when settled
        if (totalSpeed / PARTICLE_COUNT < 0.001) {
          explosionActive = false;
          explosionDecay = 0;
          velocities.fill(0);
        }
      }

      // Bloom: smooth toward target with pulse
      const baseBoom = bloomTarget + Math.sin(time * 0.5) * 0.2;
      bloomPass.strength += (baseBoom - bloomPass.strength) * 0.08;

      controls.update();
      composer.render();
    }

    animate();

    // ============================================================
    // EMBEDDING-DRIVEN FORMATION GENERATOR
    // ============================================================
    // The 64-dim embedding vector becomes the DNA of each formation.
    // Different dimension ranges control different visual properties.

    const API = "https://api.run402.com/functions/v1/cosmicforge";
    let APIKEY = "";
    const params = new URLSearchParams(location.search);
    APIKEY = params.get("key") || "";

    // Map a value from [-1,1] embedding range to [min,max]
    function emb(v, min, max) {
      return min + (v * 0.5 + 0.5) * (max - min);
    }

    // Generate a procedural formation from an embedding vector
    function embeddingFormation(emb64) {
      // dims 0-5:  structure type blend weights (how much spiral vs shell vs helix vs plane vs burst vs ring)
      const weights = emb64.slice(0, 6).map(v => Math.abs(v));
      const wSum = weights.reduce((a, b) => a + b, 0.001);
      const w = weights.map(v => v / wSum);

      // dims 6-11: structural parameters
      const armCount = Math.round(emb(emb64[6], 2, 7));
      const twistRate = emb(emb64[7], 0.3, 2.5);
      const spread = emb(emb64[8], 2, 6);
      const height = emb(emb64[9], 0.1, 4);
      const density = emb(emb64[10], 0.3, 1.0);
      const innerRadius = emb(emb64[11], 0, 1.5);

      // dims 12-17: secondary params
      const helixLoops = emb(emb64[12], 3, 12);
      const helixRadius = emb(emb64[13], 0.8, 2.5);
      const waveFreqX = emb(emb64[14], 0.3, 2.0);
      const waveFreqZ = emb(emb64[15], 0.2, 1.5);
      const burstCount = Math.round(emb(emb64[16], 2, 7));
      const shellThickness = emb(emb64[17], 0.3, 1.5);

      return function(i, total) {
        const r01 = Math.random();
        const rand1 = Math.random();
        const rand2 = Math.random();

        // === Shape generators (same as presets but parameterized) ===

        // 0: Spiral galaxy
        const arm = Math.floor(rand1 * armCount);
        const armAngle = (arm / armCount) * Math.PI * 2;
        const sr = Math.pow(r01, density) * spread;
        const sAngle = armAngle + sr * twistRate + (rand2 - 0.5) * 0.5;
        const sy = (Math.random() - 0.5) * height * (1 - sr / spread);
        const spiral = [Math.cos(sAngle) * sr, sy, Math.sin(sAngle) * sr];

        // 1: Spherical shell
        const sPhi = Math.acos(2 * rand1 - 1);
        const sTheta = rand2 * Math.PI * 2;
        const sR = spread * 0.7 + (Math.random() - 0.5) * shellThickness;
        const shell = [sR*Math.sin(sPhi)*Math.cos(sTheta), sR*Math.cos(sPhi), sR*Math.sin(sPhi)*Math.sin(sTheta)];

        // 2: Double helix
        const ht = (i / total) * Math.PI * helixLoops;
        const hStrand = i % 2;
        const hPhase = hStrand * Math.PI;
        const hy = (i / total - 0.5) * spread * 2;
        const helix = [
          Math.cos(ht + hPhase) * helixRadius + (Math.random()-0.5)*0.1,
          hy,
          Math.sin(ht + hPhase) * helixRadius + (Math.random()-0.5)*0.1
        ];

        // 3: Wave plane
        const wx = (rand1 - 0.5) * spread * 2;
        const wz = (rand2 - 0.5) * spread * 2;
        const wy = Math.sin(wx * waveFreqX) * height * 0.5
                  + Math.sin(wz * waveFreqZ + wx * 0.3) * height * 0.3;
        const plane = [wx, wy, wz];

        // 4: Multi-burst
        const bIdx = Math.floor(Math.random() * burstCount);
        const bAngle = (bIdx / burstCount) * Math.PI * 2;
        const bR2 = spread * 0.4;
        const cx = Math.cos(bAngle) * bR2;
        const cy = Math.sin(bAngle) * bR2 + height * 0.5;
        const bPhi = Math.acos(2 * rand1 - 1);
        const bTheta = rand2 * Math.PI * 2;
        const br = Math.pow(Math.random(), 0.5) * spread * 0.4;
        const burst = [
          cx + br*Math.sin(bPhi)*Math.cos(bTheta),
          cy + br*Math.cos(bPhi),
          br*Math.sin(bPhi)*Math.sin(bTheta)
        ];

        // 5: Torus / ring
        const R = spread * 0.6;
        const tr = innerRadius + 0.5;
        const tu = rand1 * Math.PI * 2;
        const tv = rand2 * Math.PI * 2;
        const ring = [
          (R + tr * Math.cos(tv)) * Math.cos(tu),
          tr * Math.sin(tv) * height * 0.4,
          (R + tr * Math.cos(tv)) * Math.sin(tu)
        ];

        // Blend all shapes by weights
        const pos = [0, 0, 0];
        const shapes = [spiral, shell, helix, plane, burst, ring];
        for (let s = 0; s < 6; s++) {
          pos[0] += shapes[s][0] * w[s];
          pos[1] += shapes[s][1] * w[s];
          pos[2] += shapes[s][2] * w[s];
        }

        return pos;
      };
    }

    // Generate a color palette from embedding dims 18-29
    function embeddingPalette(emb64) {
      const pal = [];
      for (let i = 0; i < 4; i++) {
        const base = 18 + i * 3;
        // Map embedding values to HSL then to RGB for more pleasing colors
        const hue = emb(emb64[base], 0, 360);
        const sat = emb(emb64[base + 1], 40, 100);
        const lit = emb(emb64[base + 2], 30, 70);
        pal.push(hslToRgb(hue, sat, lit));
      }
      return pal;
    }

    function hslToRgb(h, s, l) {
      s /= 100; l /= 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;
      let r, g, b;
      if (h < 60)       { r=c; g=x; b=0; }
      else if (h < 120) { r=x; g=c; b=0; }
      else if (h < 180) { r=0; g=c; b=x; }
      else if (h < 240) { r=0; g=x; b=c; }
      else if (h < 300) { r=x; g=0; b=c; }
      else              { r=c; g=0; b=x; }
      return [r + m, g + m, b + m];
    }

    // Apply an embedding-driven formation
    function applyEmbeddingFormation(emb64) {
      const fn = embeddingFormation(emb64);
      const pal = embeddingPalette(emb64);

      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        originalPositions[i] = positions[i];
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const [x, y, z] = fn(i, PARTICLE_COUNT);
        targetPositions[i * 3] = x;
        targetPositions[i * 3 + 1] = y;
        targetPositions[i * 3 + 2] = z;
        sizes[i] = 0.3 + Math.random() * 0.7;
      }

      targetPalette = pal;
      transitionProgress = 0;
      transitionStart = performance.now() / 1000;
      isTransitioning = true;

      // Turbulence from embedding
      particleMaterial.uniforms.uTurbulence.value = emb(emb64[30] || 0, 0.1, 0.6);

      geometry.attributes.aTarget.needsUpdate = true;
      geometry.attributes.aSize.needsUpdate = true;
    }

    // ============================================================
    // PRESET FALLBACKS (used for sidebar buttons when offline)
    // ============================================================
    const presetDescriptions = {
      galaxy:     { name: 'Stellar Vortex', desc: 'A spiral dance of 80,000 stars, each following the gravitational choreography of an ancient cosmos.' },
      dna:        { name: 'Helix of Life', desc: 'The double helix unwinds — the molecular code that writes every living thing into existence.' },
      blackhole:  { name: 'Event Horizon', desc: 'Where light bends and time dissolves. An accretion disk of pure energy spiraling into the void.' },
      supernova:  { name: 'Stellar Bloom', desc: 'A dying star explodes outward, seeding the universe with the heavy elements that make worlds.' },
      tornado:    { name: 'Chaos Spiral', desc: 'Pure turbulence given form. A vortex that draws everything into its relentless spin.' },
      heartbeat:  { name: 'Pulse of Love', desc: 'The universal shape of connection, carved from light. Every particle beats in rhythm.' },
      ocean:      { name: 'Infinite Wave', desc: 'A plane of liquid light, rippling with the memory of every tide that ever turned.' },
      fireworks:  { name: 'Joy Cascade', desc: 'Bursts of pure celebration, scattered across the void like champagne turned to starlight.' },
    };

    // ============================================================
    // UI
    // ============================================================
    const input = document.getElementById('concept-input');
    const btn = document.getElementById('forge-btn');
    const statusEl = document.getElementById('status');
    const entityInfoEl = document.getElementById('entity-info');
    const entityNameEl = document.getElementById('entity-name');
    const entityDescEl = document.getElementById('entity-desc');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') forge();
    });

    window.forge = async function() {
      const concept = input.value.trim();
      if (!concept) return;

      btn.disabled = true;
      statusEl.textContent = 'Forging...';

      try {
        const headers = { "Content-Type": "application/json" };
        if (APIKEY) headers["apikey"] = APIKEY;

        const res = await fetch(API + "/embed", {
          method: "POST",
          headers,
          body: JSON.stringify({ concept }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "API error");
        }

        const data = await res.json();
        const { name, desc, embedding } = data;

        // Apply embedding-driven formation
        applyEmbeddingFormation(embedding);

        // Show entity info with color from the generated palette
        const pal = embeddingPalette(embedding);
        const mainColor = `rgb(${Math.round(pal[0][0]*255)}, ${Math.round(pal[0][1]*255)}, ${Math.round(pal[0][2]*255)})`;

        entityNameEl.style.color = mainColor;
        entityNameEl.textContent = name;
        entityDescEl.textContent = desc;
        entityInfoEl.classList.add('visible');

        statusEl.textContent = `"${concept}" forged into ${name}`;
        btn.disabled = false;

        setTimeout(() => {
          entityInfoEl.classList.remove('visible');
        }, 6000);
      } catch (err) {
        // Fallback to preset formations if API is unavailable
        statusEl.textContent = 'API unavailable — using local formation';
        const keys = Object.keys(formations);
        const fallback = keys[Math.floor(Math.random() * keys.length)];
        applyFormation(fallback);
        const info = presetDescriptions[fallback] || { name: fallback, desc: '' };

        const pal = palettes[fallback];
        const mainColor = `rgb(${Math.round(pal[0][0]*255)}, ${Math.round(pal[0][1]*255)}, ${Math.round(pal[0][2]*255)})`;
        entityNameEl.style.color = mainColor;
        entityNameEl.textContent = info.name;
        entityDescEl.textContent = info.desc;
        entityInfoEl.classList.add('visible');

        btn.disabled = false;
        setTimeout(() => { entityInfoEl.classList.remove('visible'); }, 6000);
      }
    };

    window.forgePreset = function(name) {
      // Presets use local formations (no API call needed)
      input.value = name;
      const info = presetDescriptions[name] || { name, desc: '' };

      applyFormation(name);

      const pal = palettes[name] || palettes.galaxy;
      const mainColor = `rgb(${Math.round(pal[0][0]*255)}, ${Math.round(pal[0][1]*255)}, ${Math.round(pal[0][2]*255)})`;

      entityNameEl.style.color = mainColor;
      entityNameEl.textContent = info.name;
      entityDescEl.textContent = info.desc;
      entityInfoEl.classList.add('visible');

      statusEl.textContent = `Forged: ${info.name}`;

      setTimeout(() => {
        entityInfoEl.classList.remove('visible');
      }, 6000);
    };

    // Fade help text
    setTimeout(() => {
      document.getElementById('help').style.opacity = '0';
    }, 8000);
  </script>
</body>
